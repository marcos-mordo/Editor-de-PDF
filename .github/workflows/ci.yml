name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, pre-text-editor]

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons (needed by tsconfig build pipeline)
        run: npm run icons

      - name: Type check
        run: npx tsc -b --pretty false

      - name: Unit tests
        run: npm test
